name: Build Native Apps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: MediaConverterPro-Linux
            asset_name: MediaConverterPro
          - os: macos-latest
            artifact_name: MediaConverterPro-macOS
            asset_name: MediaConverterPro.app
          - os: windows-latest
            artifact_name: MediaConverterPro-Windows
            asset_name: MediaConverterPro.exe

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "MediaConverterPro" main.py
        
    - name: Package macOS App
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r ../MediaConverterPro-macOS.zip MediaConverterPro.app
        
    - name: Upload macOS Artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: MediaConverterPro-macOS.zip
        
    - name: Upload Windows/Linux Artifact
      if: runner.os != 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/MediaConverterPro*
